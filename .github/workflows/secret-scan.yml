# .github/workflows/secret-scan.yml
# Audit-mode secret scanner. Does NOT block merges.
# Findings show as warnings in the CI logs; please rotate any leaked key promptly.
# Owner: security / devops. Update via infra/deploy_secret_scan_workflow.py.

name: secret-scan
on:
  pull_request:
    branches: ['**']
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'
      - '**/*.ico'
      - '**/*.pdf'
      - '**/CHANGELOG*'
      - 'docs/**'
      - '**/*.lock'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - 'Podfile.lock'
      - 'Gemfile.lock'
  push:
    branches: ['**']
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
      - '**/*.svg'
      - '**/*.ico'
      - '**/*.pdf'
      - '**/CHANGELOG*'
      - 'docs/**'
      - '**/*.lock'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - 'Podfile.lock'
      - 'Gemfile.lock'
  workflow_dispatch:

# ✦✦ Cancel in-flight runs on the same ref when a new commit lands ✦✦ #
concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: scan for committed secrets
    runs-on: ubuntu-24.04-arm  # ARM Graviton, ~37% cheaper than ubuntu-latest x86
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✦✦ Cache gitleaks binary -- saves ~10s per run after first run ✦✦ #
      - name: cache gitleaks binary
        id: cache-gitleaks
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/gitleaks
          key: gitleaks-v8.21.0-linux-arm64

      - name: install gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p ~/.local/bin
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.0/gitleaks_8.21.0_linux_arm64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          mv gitleaks ~/.local/bin/
          chmod +x ~/.local/bin/gitleaks

      - name: add gitleaks to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: gitleaks scan (PR diff or full history, warn-only)
        id: gitleaks
        continue-on-error: true
        run: |
          set +e
          gitleaks version
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            echo "PR diff scan: $BASE_SHA..$HEAD_SHA (only commits introduced by this PR)"
            gitleaks detect \
              --source . \
              --log-opts="--no-merges $BASE_SHA..$HEAD_SHA" \
              --redact --no-banner --verbose \
              --report-format json --report-path gitleaks-report.json
          else
            echo "Full history scan (push / schedule / manual run)"
            gitleaks detect \
              --source . \
              --redact --no-banner --verbose \
              --report-format json --report-path gitleaks-report.json
          fi
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore
          retention-days: 30

      - name: trufflehog scan (only verified secrets - push events only)
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: trufflesecurity/trufflehog@v3.82.13
        with:
          path: ./
          extra_args: --only-verified --no-update

      - name: summary
        if: always()
        run: |
          echo "### Secret scan summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This is an **audit-only** scan. Findings DO NOT block your PR." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f gitleaks-report.json ] && [ -s gitleaks-report.json ] && [ "$(jq 'length' gitleaks-report.json)" != "0" ]; then
            echo ":warning: **gitleaks found potential secrets in this commit/PR.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Action required:" >> $GITHUB_STEP_SUMMARY
            echo "1. Rotate the leaked key NOW (in the upstream provider - AWS, Google, etc.)." >> $GITHUB_STEP_SUMMARY
            echo "2. Move the value to AWS Secrets Manager / env var, never commit." >> $GITHUB_STEP_SUMMARY
            echo "3. Remove from git history (\`git filter-repo\` or BFG)." >> $GITHUB_STEP_SUMMARY
            echo "4. Download the artifact \`gitleaks-report\` for full details." >> $GITHUB_STEP_SUMMARY
          else
            echo ":white_check_mark: No new secrets detected." >> $GITHUB_STEP_SUMMARY
          fi
